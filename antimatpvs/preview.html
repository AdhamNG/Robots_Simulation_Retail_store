<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>NavMe — AR Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cyan: #6ec8ff;
      --violet: #9b87f5;
      --green: #34d399;
      --red: #fb7185;
      --amber: #fbbf24;
      --bg-deep: #05050d;
      --text-1: #eef2f8;
      --text-2: #94a3b8;
      --text-3: #5c6b80;
      --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg-deep);
      font-family: var(--font-body);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
    }
    #ar-container {
      position: fixed; inset: 0;
      overflow: hidden;
    }
    .ar-video-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .ar-three-canvas {
      position: absolute; inset: 0;
      width: 100% !important; height: 100% !important;
      z-index: 1;
      pointer-events: none;
    }

    /* HUD */
    .ar-hud {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 10;
      padding: max(env(safe-area-inset-top, 12px), 12px) 16px 12px;
      display: flex; align-items: center; gap: 12px;
      background: linear-gradient(180deg, rgba(5,5,13,0.85) 0%, transparent 100%);
      pointer-events: none;
    }
    .ar-hud-logo {
      font-family: var(--font-mono);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .ar-hud-status {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text-2);
      text-align: right;
    }

    /* Localization indicator */
    .ar-localize-badge {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom, 24px), 24px);
      left: 50%; transform: translateX(-50%);
      z-index: 10;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 24px;
      background: rgba(8, 10, 18, 0.88);
      border: 1px solid rgba(110, 200, 255, 0.15);
      border-radius: 12px;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
      transition: opacity 0.3s, border-color 0.3s;
    }
    .ar-localize-badge.localized {
      border-color: rgba(52, 211, 153, 0.35);
    }
    .ar-localize-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--amber);
      animation: pulse-dot 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    .ar-localize-badge.localized .ar-localize-dot {
      background: var(--green);
      animation: none;
    }
    .ar-localize-text {
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-2);
    }
    .ar-localize-badge.localized .ar-localize-text {
      color: var(--green);
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    /* Scanning crosshair */
    .ar-crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      width: 64px; height: 64px;
      pointer-events: none;
      opacity: 0.5;
      transition: opacity 0.3s;
    }
    .ar-crosshair.hidden { opacity: 0; }
    .ar-crosshair svg { width: 100%; height: 100%; }

    /* Error overlay */
    .ar-error {
      position: fixed; inset: 0;
      z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      background: rgba(5,5,13,0.95);
      padding: 32px;
      text-align: center;
    }
    .ar-error-title {
      font-family: var(--font-mono);
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--red);
    }
    .ar-error-msg {
      font-size: 13px; color: var(--text-2);
      max-width: 340px; line-height: 1.6;
    }
    .ar-error-btn {
      margin-top: 8px; padding: 10px 24px;
      border: 1px solid rgba(110,200,255,0.25);
      border-radius: 6px;
      background: rgba(110,200,255,0.08);
      color: var(--cyan);
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer;
    }
    .ar-error.hidden { display: none; }
  </style>
</head>
<body>
  <div id="ar-container"></div>

  <!-- HUD -->
  <div class="ar-hud">
    <div class="ar-hud-logo">NavMe</div>
    <div class="ar-hud-status" id="ar-status">Initializing…</div>
  </div>

  <!-- Crosshair -->
  <div class="ar-crosshair" id="ar-crosshair">
    <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" color="rgba(110,200,255,0.7)">
      <line x1="32" y1="8" x2="32" y2="20" />
      <line x1="32" y1="44" x2="32" y2="56" />
      <line x1="8" y1="32" x2="20" y2="32" />
      <line x1="44" y1="32" x2="56" y2="32" />
      <circle cx="32" cy="32" r="6" stroke-dasharray="3 3" />
    </svg>
  </div>

  <!-- Localization badge -->
  <div class="ar-localize-badge" id="ar-badge">
    <div class="ar-localize-dot"></div>
    <div class="ar-localize-text" id="ar-badge-text">Scanning…</div>
  </div>

  <!-- Error overlay -->
  <div class="ar-error hidden" id="ar-error">
    <div class="ar-error-title">Error</div>
    <div class="ar-error-msg" id="ar-error-msg"></div>
    <button class="ar-error-btn" onclick="location.reload()">Retry</button>
  </div>

  <script type="module">
    import { ARPreview } from '/src/ar/ar-preview.js';

    const params = new URLSearchParams(location.search);
    const clientId = params.get('cid') || '';
    const clientSecret = params.get('cs') || '';
    const mapCode = params.get('map') || '';

    const statusEl = document.getElementById('ar-status');
    const badgeEl = document.getElementById('ar-badge');
    const badgeText = document.getElementById('ar-badge-text');
    const crosshair = document.getElementById('ar-crosshair');
    const errorOverlay = document.getElementById('ar-error');
    const errorMsg = document.getElementById('ar-error-msg');

    if (!clientId || !clientSecret || !mapCode) {
      errorOverlay.classList.remove('hidden');
      errorMsg.textContent = 'Missing credentials. Open this page from the NavMe Editor\'s Live Preview button.';
    } else {
      const preview = new ARPreview(document.getElementById('ar-container'), {
        clientId,
        clientSecret,
        mapCode,
        onStatus(msg) {
          statusEl.textContent = msg;
          badgeText.textContent = msg;
        },
        onLocalized() {
          badgeEl.classList.add('localized');
          crosshair.classList.add('hidden');
        },
        onError(msg) {
          errorOverlay.classList.remove('hidden');
          errorMsg.textContent = msg;
        },
      });
      preview.start();
    }
  </script>
</body>
</html>
