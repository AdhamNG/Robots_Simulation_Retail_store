# Render: only used if the service "Root Directory" is set to `antimatpvs`.
# If the repo root is the project root, use ../render.yaml (build uses --prefix antimatpvs).
# Dashboard: https://dashboard.render.com
services:
  - type: web
    name: navme-editor
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run preview
    envVars:
      - key: NODE_VERSION
        value: '20'
